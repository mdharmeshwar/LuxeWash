services:
  - type: web
    name: luxewash
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: luxewash-data
      mountPath: /var/data
      sizeGB: 1
